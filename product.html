<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>margo — producto</title>
  <link href="https://fonts.googleapis.com/css2?family=Host+Grotesk:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="static/css/tokens.css">
  <link rel="stylesheet" href="static/css/base.css">
  <link rel="stylesheet" href="static/css/components.css">
</head>
<body>

  <nav class="nav">
    <a class="nav-logo" href="index.html">
      <div class="nav-logomark"><span>mar<br>go</span></div>
      <span class="nav-brandname">margo</span>
    </a>
  </nav>

  <div class="product-layout">

    <!-- Galería (columna izquierda, sticky) -->
    <div class="product-gallery">
      <div class="gallery-thumbs" id="gallery-thumbs"></div>
      <div class="gallery-main">
        <img id="gallery-main-img" src="" alt="">
        <button class="gallery-arrow prev" id="arrow-prev">&#8592;</button>
        <button class="gallery-arrow next" id="arrow-next">&#8594;</button>
      </div>
    </div>

    <!-- Info (columna derecha, scrolleable) -->
    <div class="product-info">

      <a class="product-back" href="index.html">Catálogo</a>

      <p class="eyebrow product-eyebrow" id="p-category"></p>
      <h1 class="product-name" id="p-name"></h1>
      <p class="product-price" id="p-price"></p>

      <div class="divider product-divider"></div>

      <p class="product-desc" id="p-desc"></p>

      <!-- Acabados -->
      <div id="finishes-section">
        <div class="swatches-header">
          <span class="label">Acabado</span>
          <span class="swatches-selected" id="finish-selected"></span>
        </div>
        <div class="swatches-row" id="finishes-grid"></div>
      </div>

      <!-- Especificaciones -->
      <div class="specs" id="specs-section">
        <p class="label specs-label">Especificaciones</p>
        <div id="specs-list"></div>
      </div>

      <button class="btn-primary" id="copy-btn">Copiar consulta</button>
      <p class="copy-confirm" id="copy-confirm">✓ Copiado al portapapeles</p>

    </div>
  </div>

  <script src="data/products.js"></script>
  <script src="static/js/product.js"></script>
</body>
</html>
